<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Pennymac TRE Stock Mover Dashboard</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
      background-color: #0f1117;
      color: #222a35;
      min-height: 100vh;
      padding: 2rem 1rem;
    }

    .header {
      text-align: center;
      margin-bottom: 2.5rem;
    }

    .header h1 {
      font-size: 2rem;
      font-weight: 700;
      letter-spacing: -0.5px;
      color: #f8fafc;
    }

    .header h1 span {
      color: #38bdf8;
    }

    .header p {
      margin-top: 0.5rem;
      color: #94a3b8;
      font-size: 0.95rem;
    }

    .watchlist {
      margin-top: 0.75rem;
      display: flex;
      justify-content: center;
      flex-wrap: wrap;
      gap: 0.4rem;
    }

    .watchlist-badge {
      background: #1e293b;
      border: 1px solid #334155;
      color: #94a3b8;
      font-size: 0.75rem;
      padding: 0.2rem 0.6rem;
      border-radius: 999px;
      font-weight: 500;
    }

    .grid {
      max-width: 900px;
      margin: 0 auto;
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(280px, 1fr));
      gap: 1.25rem;
    }

    .card {
      background: #1e293b;
      border-radius: 14px;
      padding: 1.4rem;
      border: 1px solid #334155;
      transition: transform 0.15s ease, box-shadow 0.15s ease;
      position: relative;
      overflow: hidden;
    }

    .card:hover {
      transform: translateY(-3px);
      box-shadow: 0 8px 30px rgba(0, 0, 0, 0.4);
    }

    /* Color */
    .card.gain {
      border-left: 4px solid #22c55e;
    }

    .card.loss {
      border-left: 4px solid #ef4444;
    }

    .card-top {
      display: flex;
      justify-content: space-between;
      align-items: flex-start;
      margin-bottom: 0.75rem;
    }

    .ticker {
      font-size: 1.6rem;
      font-weight: 800;
      color: #f8fafc;
      letter-spacing: -0.5px;
    }

    .date {
      font-size: 0.75rem;
      color: #64748b;
      margin-top: 0.2rem;
    }

    .pct-badge {
      font-size: 1.1rem;
      font-weight: 700;
      padding: 0.3rem 0.75rem;
      border-radius: 8px;
      white-space: nowrap;
    }

    .pct-badge.gain {
      background: rgba(34, 197, 94, 0.15);
      color: #22c55e;
    }

    .pct-badge.loss {
      background: rgba(239, 68, 68, 0.15);
      color: #ef4444;
    }

    .price-row {
      display: flex;
      align-items: center;
      gap: 0.5rem;
      margin-bottom: 1rem;
    }

    .close-price {
      font-size: 0.9rem;
      color: #94a3b8;
    }

    .close-price strong {
      color: #cbd5e1;
    }

    .ai-section {
      background: #0f1117;
      border-radius: 8px;
      padding: 0.85rem;
      border: 1px solid #1e293b;
    }

    .ai-label {
      font-size: 0.65rem;
      font-weight: 700;
      letter-spacing: 1px;
      text-transform: uppercase;
      color: #38bdf8;
      margin-bottom: 0.4rem;
    }

    .ai-text {
      font-size: 0.82rem;
      color: #94a3b8;
      line-height: 1.55;
    }

    .state-container {
      max-width: 900px;
      margin: 0 auto;
      text-align: center;
      padding: 4rem 1rem;
    }

    .spinner {
      width: 40px;
      height: 40px;
      border: 3px solid #334155;
      border-top-color: #38bdf8;
      border-radius: 50%;
      animation: spin 0.8s linear infinite;
      margin: 0 auto 1rem;
    }

    @keyframes spin {
      to {
        transform: rotate(360deg);
      }
    }

    .state-title {
      font-size: 1rem;
      color: #94a3b8;
    }

    .error-icon {
      font-size: 2.5rem;
      margin-bottom: 0.75rem;
    }

    .error-msg {
      color: #ef4444;
      font-size: 0.9rem;
      margin-top: 0.5rem;
    }

    .footer {
      text-align: center;
      margin-top: 3rem;
      color: #334155;
      font-size: 0.75rem;
    }

    @media (max-width: 480px) {
      .header h1 {
        font-size: 1.5rem;
      }

      .ticker {
        font-size: 1.3rem;
      }
    }
  </style>
</head>

<body>

  <div class="header">
    <h1>TRE <span>Stock Mover</span> Dashboard</h1>
    <p>The single biggest mover from our watchlist — updated daily after market close.</p>
    <div class="watchlist">
      <span class="watchlist-badge">AAPL</span>
      <span class="watchlist-badge">MSFT</span>
      <span class="watchlist-badge">GOOGL</span>
      <span class="watchlist-badge">AMZN</span>
      <span class="watchlist-badge">TSLA</span>
      <span class="watchlist-badge">NVDA</span>
    </div>
  </div>

  <div id="app"></div>

  <div class="footer">
    <p>Powered by AWS Lambda · DynamoDB · API Gateway · Claude AI</p>
  </div>

  <script>
    // Replace URL after Terraform deploys
    const API_URL = "REPLACE_WITH_YOUR_API_GATEWAY_URL";

    function formatDate(dateStr) {
      const [year, month, day] = dateStr.split("-");
      const date = new Date(year, month - 1, day);
      return date.toLocaleDateString("en-US", {
        weekday: "short",
        month: "short",
        day: "numeric",
        year: "numeric"
      });
    }

    function buildCard(mover) {
      const isGain = mover.pct_change >= 0;
      const colorClass = isGain ? "gain" : "loss";
      const arrow = isGain ? "▲" : "▼";
      const pctDisplay = `${arrow} ${Math.abs(mover.pct_change).toFixed(2)}%`;
      const summary = mover.ai_summary || "No summary available.";

      return `
        <div class="card ${colorClass}">
          <div class="card-top">
            <div>
              <div class="ticker">${mover.ticker}</div>
              <div class="date">${formatDate(mover.date)}</div>
            </div>
            <div class="pct-badge ${colorClass}">${pctDisplay}</div>
          </div>

          <div class="price-row">
            <span class="close-price">Closing price: <strong>$${mover.close_price.toFixed(2)}</strong></span>
          </div>

          <div class="ai-section">
            <div class="ai-label">✦ AI Summary</div>
            <div class="ai-text">${summary}</div>
          </div>
        </div>
      `;
    }

    function showLoading() {
      document.getElementById("app").innerHTML = `
        <div class="state-container">
          <div class="spinner"></div>
          <p class="state-title">Fetching market data...</p>
        </div>
      `;
    }

    function showError(message) {
      document.getElementById("app").innerHTML = `
        <div class="state-container">
          <div class="error-icon">⚠️</div>
          <p class="state-title">Could not load data</p>
          <p class="error-msg">${message}</p>
        </div>
      `;
    }

    function showEmpty() {
      document.getElementById("app").innerHTML = `
        <div class="state-container">
          <div class="error-icon">📭</div>
          <p class="state-title">No data yet — check back after market close today.</p>
        </div>
      `;
    }

    function showCards(movers) {
      const html = movers.map(buildCard).join("");
      document.getElementById("app").innerHTML = `<div class="grid">${html}</div>`;
    }

    async function loadMovers() {
      showLoading();

      try {
        const response = await fetch(API_URL);

        if (!response.ok) {
          throw new Error(`API returned status ${response.status}`);
        }

        const data = await response.json();

        if (!data.movers || data.movers.length === 0) {
          showEmpty();
          return;
        }

        showCards(data.movers);

      } catch (err) {
        console.error("Failed to fetch movers:", err);
        showError(err.message);
      }
    }

    loadMovers();
  </script>

</body>

</html>
